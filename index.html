<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapTap Practice - Interactive 3D Globe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #08080e;
      color: #e0e0e0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      user-select: none;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      background: rgba(8, 8, 14, 0.8);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo span { color: #6c8cff; }

    .stats {
      font-size: 13px;
      color: #555;
      display: flex;
      gap: 20px;
    }

    .stats strong { color: #6c8cff; font-weight: 600; }

    #globe-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      cursor: grab;
    }

    canvas:active {
      cursor: grabbing;
    }

    .country-path {
      cursor: pointer;
    }

    #tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(12, 12, 22, 0.95);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(108, 140, 255, 0.35);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      opacity: 0;
      transform: translateY(6px) scale(0.95);
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 200;
      white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(108, 140, 255, 0.1);
    }

    #tooltip.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .tooltip-name {
      font-size: 15px;
      font-weight: 600;
    }

    .tooltip-capital {
      font-size: 12px;
      color: #8a8aaa;
      margin-top: 2px;
    }

    .capital-dot {
      fill: #ff6b6b;
      stroke: #fff;
      stroke-width: 1.2;
      filter: drop-shadow(0 0 4px rgba(255, 107, 107, 0.6));
    }

    .capital-label {
      fill: #fff;
      font-size: 10px;
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 600;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      pointer-events: none;
    }

    .controls {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 100;
    }

    .controls button {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      background: rgba(12, 12, 22, 0.9);
      backdrop-filter: blur(8px);
      color: #777;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .controls button:hover {
      color: #fff;
      border-color: rgba(108, 140, 255, 0.4);
      background: rgba(20, 20, 40, 0.95);
    }

    .hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #333;
      z-index: 100;
      letter-spacing: 0.3px;
    }

    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 15px;
      color: #444;
      z-index: 300;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid #222;
      border-top-color: #6c8cff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Atmosphere glow */
    .atmosphere {
      filter: drop-shadow(0 0 40px rgba(108, 140, 255, 0.08))
             drop-shadow(0 0 80px rgba(108, 140, 255, 0.04));
    }
  </style>
</head>

        ["804",{n:"Ukraine",c:"Kyiv",p:[30.52,50.45]}],
        ["807",{n:"North Macedonia",c:"Skopje",p:[21.43,42.0]}],
        ["818",{n:"Egypt",c:"Cairo",p:[31.24,30.04]}],
        ["826",{n:"United Kingdom",c:"London",p:[-0.13,51.51]}],
        ["834",{n:"Tanzania",c:"Dodoma",p:[35.74,-6.16]}],
        ["840",{n:"United States of America",c:"Washington, D.C.",p:[-77.04,38.9]}],
        ["854",{n:"Burkina Faso",c:"Ouagadougou",p:[-1.52,12.37]}],
        ["858",{n:"Uruguay",c:"Montevideo",p:[-56.16,-34.88]}],
        ["860",{n:"Uzbekistan",c:"Tashkent",p:[69.28,41.3]}],
        ["862",{n:"Venezuela",c:"Caracas",p:[-66.9,10.49]}],
        ["882",{n:"Samoa",c:"Apia",p:[-171.76,-13.83]}],
        ["887",{n:"Yemen",c:"Sana'a",p:[44.21,15.35]}],
        ["894",{n:"Zambia",c:"Lusaka",p:[28.28,-15.42]}],
        ["-99",{n:"Northern Cyprus",c:"North Nicosia",p:[33.36,35.19]}],
        ["010",{n:"Antarctica",c:"",p:[0,-90]}]
      ]);

      // Load world TopoJSON
      const world = await d3.json('https://unpkg.com/world-atlas@2/countries-110m.json');

      loading.style.display = 'none';

      const countries = topojson.feature(world, world.objects.countries);
      totalEl.textContent = countries.features.length;

      const found = new Set();
      let activeFeature = null;

      // Draw countries
      const countryPaths = g.selectAll('.country')
        .data(countries.features)
        .enter()
        .append('path')
        .attr('class', 'country')
        .attr('d', path)
        .attr('fill', '#1a1a30')
        .attr('stroke', '#2a2a4a')
        .attr('stroke-width', 0.5)
        .style('cursor', 'pointer')
        .on('mouseover', function(event, d) {
          const isVisible = isCountryVisible(d);
          if (!isVisible) return;
          if (d !== activeFeature) {
            d3.select(this)
              .attr('fill', '#252550')
              .attr('stroke', '#3a3a6a')
              .attr('stroke-width', 0.8);
          }
        })
        .on('mouseout', function(event, d) {
          if (d !== activeFeature) {
            d3.select(this)
              .attr('fill', '#1a1a30')
              .attr('stroke', '#2a2a4a')
              .attr('stroke-width', 0.5);
          }
        })
        .on('click', function(event, d) {
          if (!isCountryVisible(d)) return;
          event.stopPropagation();

          // Deselect previous
          if (activeFeature) {
            countryPaths.filter(f => f === activeFeature)
              .attr('fill', '#1a1a30')
              .attr('stroke', '#2a2a4a')
              .attr('stroke-width', 0.5);
          }

          activeFeature = d;
          d3.select(this)
            .attr('fill', '#2a2a6e')
            .attr('stroke', '#6c8cff')
            .attr('stroke-width', 1.5)
            .raise();

          const id = String(d.id);
          const padded = id.padStart(3, '0');
          const info = countryData.get(padded) || countryData.get(id);
          const name = info ? info.n : 'Unknown territory';
          const capital = info ? info.c : '';

          tooltipName.textContent = name;
          tooltipCapital.textContent = capital ? 'Capital: ' + capital : '';
          tooltip.classList.add('visible');
          tooltip.style.left = (event.clientX + 16) + 'px';
          tooltip.style.top = (event.clientY - 16) + 'px';

          // Draw capital dot
          removeCapitalDot();
          if (info && info.c && info.p) {
            const coords = info.p;
            const projected = projection(coords);
            if (projected) {
              capitalDot = g.append('circle')
                .attr('class', 'capital-dot')
                .attr('cx', projected[0])
                .attr('cy', projected[1])
                .attr('r', 4);
              capitalLabel = g.append('text')
                .attr('class', 'capital-label')
                .attr('x', projected[0] + 7)
                .attr('y', projected[1] + 4)
                .text(capital);
            }
          }

          if (!found.has(d.id)) {
            found.add(d.id);
            countEl.textContent = found.size;
          }
        });

      // Click globe background to deselect
      svg.on('click', function() {
        deselect();
      });

      function removeCapitalDot() {
        if (capitalDot) { capitalDot.remove(); capitalDot = null; }
        if (capitalLabel) { capitalLabel.remove(); capitalLabel = null; }
      }

      function deselect() {
        if (activeFeature) {
          countryPaths.filter(f => f === activeFeature)
            .attr('fill', '#1a1a30')
            .attr('stroke', '#2a2a4a')
            .attr('stroke-width', 0.5);
          activeFeature = null;
        }
        removeCapitalDot();
        tooltip.classList.remove('visible');
      }

      // Check if a country's centroid is on the visible side of the globe
      function isCountryVisible(d) {
        const centroid = d3.geoCentroid(d);
        const rotate = projection.rotate();
        const distance = d3.geoDistance(centroid, [-rotate[0], -rotate[1]]);
        return distance < Math.PI / 2;
      }

      // Drag to rotate
      const drag = d3.drag()
        .on('drag', function(event) {
          const r = projection.rotate();
          projection.rotate([
            r[0] + event.dx * sensitivity,
            Math.max(-90, Math.min(90, r[1] - event.dy * sensitivity)),
            r[2]
          ]);
          render();
        });

      svg.call(drag);

      // Scroll to zoom
      svg.on('wheel.zoom', function(event) {
        event.preventDefault();
        const currentScale = projection.scale();
        const factor = event.deltaY > 0 ? 0.92 : 1.08;
        const newScale = Math.max(initialScale * 0.5, Math.min(initialScale * 8, currentScale * factor));
        projection.scale(newScale);
        render();
      }, { passive: false });

      // Render everything
      function render() {
        // Update globe background circle
        g.select('.globe-bg')
          .attr('r', projection.scale());

        // Update paths
        g.select('.graticule-path').attr('d', path);
        countryPaths.attr('d', path);

        // Update capital dot position
        if (capitalDot && activeFeature) {
          const id = String(activeFeature.id);
          const padded = id.padStart(3, '0');
          const info = countryData.get(padded) || countryData.get(id);
          if (info && info.p) {
            const coords = info.p;
            const rotate = projection.rotate();
            const distance = d3.geoDistance(coords, [-rotate[0], -rotate[1]]);
            if (distance < Math.PI / 2) {
              const projected = projection(coords);
              capitalDot.attr('cx', projected[0]).attr('cy', projected[1]).attr('visibility', 'visible');
              if (capitalLabel) capitalLabel.attr('x', projected[0] + 7).attr('y', projected[1] + 4).attr('visibility', 'visible');
            } else {
              capitalDot.attr('visibility', 'hidden');
              if (capitalLabel) capitalLabel.attr('visibility', 'hidden');
            }
          }
        }
      }

      // Zoom controls
      document.getElementById('zoom-in').addEventListener('click', () => {
        const s = Math.min(initialScale * 8, projection.scale() * 1.4);
        projection.scale(s);
        render();
      });

      document.getElementById('zoom-out').addEventListener('click', () => {
        const s = Math.max(initialScale * 0.5, projection.scale() * 0.7);
        projection.scale(s);
        render();
      });

      document.getElementById('reset').addEventListener('click', () => {
        projection.rotate([0, -20]).scale(initialScale);
        deselect();
        found.clear();
        countEl.textContent = '0';
        render();
      });

      // Resize
      window.addEventListener('resize', () => {
        width = window.innerWidth;
        height = window.innerHeight;
        svg.attr('width', width).attr('height', height);
        const newInitialScale = Math.min(width, height) / 2.4;
        const ratio = projection.scale() / initialScale;
        projection.translate([width / 2, height / 2]).scale(newInitialScale * ratio);
        g.select('.globe-bg')
          .attr('cx', width / 2)
          .attr('cy', height / 2);
        render();
      });

    })();
  </script>
</body>
</html>
